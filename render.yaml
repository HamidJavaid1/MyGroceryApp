services:
  - type: web
    name: bazarlink-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: mygroceryapp-4ryn.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://mygroceryapp-4ryn.onrender.com
      - key: USE_SQLITE
        value: false
      - key: POSTGRES_HOST
        fromDatabase:
          name: bazarlink-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: bazarlink-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: bazarlink-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: bazarlink-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: bazarlink-db
          property: password
      - key: REDIS_URL
        fromService:
          type: redis
          name: bazarlink-redis
          property: connectionString

databases:
  - name: bazarlink-db
    databaseName: bazarlink
    user: bazarlink

  - name: bazarlink-redis
    plan: free
    maxmemoryPolicy: noeviction
