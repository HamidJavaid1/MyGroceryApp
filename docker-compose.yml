services:
  postgres:
    image: postgis/postgis:16-3.4
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bazarlink}
      POSTGRES_USER: ${POSTGRES_USER:-bazarlink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bazarlink-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  django:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      USE_SQLITE: "false"
      DEBUG: "true"
      ALLOWED_HOSTS: "*"
      CORS_ALLOW_ALL_ORIGINS: "true"
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      FIREBASE_CREDENTIALS_FILE: ""
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/schema/')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      django:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/bazarlink.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/app/media:ro
      - static_data:/app/staticfiles:ro
      - ./deploy/certbot/www:/var/www/certbot
      - ./deploy/certbot/conf:/etc/letsencrypt

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
